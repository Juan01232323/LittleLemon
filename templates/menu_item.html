{% extends 'base.html' %} 
{% load static %} 
{% block content %}
<section>
   <article>
      <h1>Menu item</h1>
      <span>
         <a href="{% url 'home' %}">Home</a> /
         <a href="{% url 'menu' %}">Menu</a> /
         {{ menu_item.title }} <!-- CAMBIADO: de name a title -->
      </span>
      <!--Begin row-->
      <div class="row">
         <div class="column">
            <h2>
                {{ menu_item.title }} <!-- CAMBIADO: de name a title -->
            </h2>
            <p>
                <!-- Tu modelo NO tiene descripción, podrías mostrar el inventario -->
                Inventory: {{ menu_item.inventory }} 
            </p>
            <p>
                Price: ${{ menu_item.price }}
            </p>
         </div>
         <div class="column">
            <!-- Corregimos la ruta de la imagen para que sea dinámica -->
            <img src="{% static 'img/' %}{{ menu_item.title }}.jpg" alt="{{ menu_item.title }}" />
        </div>
      </div>
   </article>
</section>
{% endblock %}
